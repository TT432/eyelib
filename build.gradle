plugins {
    id 'idea'
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.moddev.legacyforge' version '2.0.91'
    id 'io.freefair.lombok' version '8.6'
    id 'net.ltgt.errorprone' version '4.4.0'
    id 'signing'
    id 'io.github.gradle-nexus.publish-plugin' version '2.0.0'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = "${mod_version}+${minecraft_version}-forge"
group = mod_group_id

repositories {
    mavenCentral()
    mavenLocal()
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 17 to end users in 1.20.1, so mods should target Java 17.
java.toolchain.languageVersion = JavaLanguageVersion.of(17)

legacyForge {
    // Specify the version of MinecraftForge to use.
    version = project.minecraft_version + '-' + project.forge_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id

            systemProperty 'eyelib.preventMouseGrab', 'true'
            systemProperty 'eyelib.minimizeWindow', 'true'
        }

        clientSmoke {
            client()
            gameDirectory = project.file('run/clientsmoke')
            systemProperty 'forge.enabledGameTestNamespaces', 'clientsmoke'
            systemProperty 'clientsmoke.enabled', 'true'
            systemProperty 'clientsmoke.autoExit', 'true'
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }
sourceSets {
    test {
        compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath
        runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
    nullawayProcessor
}
obfuscation {
    createRemappingConfiguration(configurations.localRuntime)
}

// Fix ObfuscationExtension.reobfuscate() variant replacement (ModDevGradle ObfuscationExtension.java:123-147)
// The original apiElements/runtimeElements are skipped and replaced with dependency-free reobf variants.
// Restore proper dependency inheritance so published POMs carry correct transitive dependencies.
allprojects {
    afterEvaluate { p ->
        p.configurations.matching { it.name == 'reobfApiElements' }.all { c ->
            def apiCfg = p.configurations.findByName('api')
            if (apiCfg) c.extendsFrom(apiCfg)
        }
        p.configurations.matching { it.name == 'reobfRuntimeElements' }.all { c ->
            def rtCfg = p.configurations.findByName('runtimeClasspath')
            if (rtCfg) c.extendsFrom(rtCfg)
        }
    }
}

dependencies {
    api project(':eyelib-network')
    modImplementation project(':eyelib-network')
    jarJar project(':eyelib-network')
    api project(':eyelib-animation')
    modImplementation project(':eyelib-animation')
    jarJar project(':eyelib-animation')
    api project(':eyelib-behavior')
    modImplementation project(':eyelib-behavior')
    jarJar project(':eyelib-behavior')
    api project(':eyelib-attachment')
    modImplementation project(':eyelib-attachment')
    jarJar project(':eyelib-attachment')
    api project(':eyelib-material')
    modImplementation project(':eyelib-material')
    jarJar project(':eyelib-material')
    api project(':eyelib-particle')
    modImplementation project(':eyelib-particle')
    jarJar project(':eyelib-particle')
    api project(':eyelib-importer')
    modImplementation project(':eyelib-importer')
    jarJar project(':eyelib-importer')
    api project(':eyelib-molang')
    modImplementation project(':eyelib-molang')
    jarJar project(':eyelib-molang')
    api project(':eyelib-model')
    modImplementation project(':eyelib-model')
    jarJar project(':eyelib-model')
    api project(':eyelib-track')
    modImplementation project(':eyelib-track')
    jarJar project(':eyelib-track')
    api project(':eyelib-util')
    modImplementation project(':eyelib-util')
    jarJar project(':eyelib-util')

    compileOnly("maven.modrinth:acceleratedrendering:1.0.5-1.20.1-alpha")

    // Client Smoke Test is supplied by the composite build in ./clientsmoke.
    compileOnly "io.github.tt432:clientsmoke:${version}"
    localRuntime "io.github.tt432:clientsmoke:${version}"

    // AI Debug Server — dev-only runtime Java execution, gated by FMLLoader.isProduction()
    additionalRuntimeClasspath(implementation('org.codehaus.janino:janino:3.1.12'))

    jarJar additionalRuntimeClasspath(implementation('io.github.dmlloyd:jdk-classfile-backport:24.0'))
    jarJar additionalRuntimeClasspath(implementation('com.h2database:h2:2.4.240'))
    compileOnly 'org.jspecify:jspecify:1.0.0'
    errorprone 'com.google.errorprone:error_prone_core:2.42.0'
    errorprone 'com.uber.nullaway:nullaway:0.12.10'
    nullawayProcessor 'org.projectlombok:lombok:1.18.30'
    nullawayProcessor 'com.google.guava:guava:33.4.0-jre'
    nullawayProcessor 'com.google.errorprone:error_prone_core:2.42.0'
    nullawayProcessor 'com.uber.nullaway:nullaway:0.12.10'

    compileOnly(annotationProcessor('io.github.llamalad7:mixinextras-common:0.5.0'))
    implementation(jarJar('io.github.llamalad7:mixinextras-forge:0.5.0'))

//    implementation("maven.modrinth:physicsmod:3.0.20")

//    implementation "org.lwjgl:lwjgl-assimp:3.3.3"
//    runtimeOnly "org.lwjgl:lwjgl-assimp:3.3.3:natives-windows"

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'com.h2database:h2:2.4.240'
    testImplementation sourceSets.main.output
}

mixin {
    add sourceSets.main, "${mod_id}.refmap.json"
    config "${mod_id}.mixins.json"
}

dependencies {
    annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
}

jar {
    manifest.attributes([
            "MixinConfigs": "${mod_id}.mixins.json,eyelibtrack.mixins.json,eyelibattachment.mixins.json"
    ])
}

signing {
    sign publishing.publications
}

java {
    withSourcesJar()
    withJavadocJar()
}

tasks.named('javadoc', Javadoc).configure {
    options.addStringOption('Xdoclint:none', '-quiet')
    options.encoding = 'UTF-8'
    // Use original source (not delombok) to avoid delombok configuration-cache issues
    source = sourceSets.main.allJava
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version        : minecraft_version,
            minecraft_version_range  : minecraft_version_range,
            forge_version            : forge_version,
            forge_version_range      : forge_version_range,
            loader_version_range     : loader_version_range,
            mod_id                   : mod_id,
            mod_name                 : mod_name,
            mod_license              : mod_license,
            mod_version              : mod_version,
            mod_authors              : mod_authors,
            mod_description          : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
legacyForge.ideSyncTask generateModMetadata

// Collect dependency data for the mavenCentralLibrary publication.
// Subproject properties are not available during root evaluation, so defer to after all projects evaluate.
def centralCompileDeps = [] as List<Map>
def centralRuntimeDeps = [] as List<Map>

gradle.projectsEvaluated {
    subprojects.each { sub ->
        centralCompileDeps << [
                groupId: sub.group,
                artifactId: sub.base.archivesName.get(),
                version: sub.version
        ]
    }

    def jarJarModuleIds = [] as Set<String>
    project.configurations.jarJar.allDependencies.each { dep ->
        if (dep instanceof ExternalModuleDependency && dep.group != null) {
            jarJarModuleIds.add("${dep.group}:${dep.name}")
        }
    }

    def ignoredGroups = ['io.github.llamalad7', 'net.minecraftforge', 'net.neoforged']
    project.configurations.implementation.allDependencies.each { dep ->
        if (dep instanceof ExternalModuleDependency && dep.group != null
                && !ignoredGroups.contains(dep.group)
                && dep.group != project.group) {
            def id = "${dep.group}:${dep.name}"
            if (!jarJarModuleIds.contains(id)) {
                centralRuntimeDeps << [
                        groupId: dep.group,
                        artifactId: dep.name,
                        version: dep.version
                ]
            }
        }
    }
}

// Library jar — root classes only, no jarJar embedding
def centralDir = layout.buildDirectory.dir('libs-maven-central')

tasks.register('libraryJar', Jar.class) {
    archiveBaseName = 'eyelib'
    archiveVersion = project.version
    destinationDirectory = centralDir
    from sourceSets.main.output
    manifest {
        attributes 'MixinConfigs': "${mod_id}.mixins.json"
    }
}

tasks.register('librarySourcesJar', Jar.class) {
    archiveBaseName = 'eyelib'
    archiveClassifier = 'sources'
    archiveVersion = project.version
    destinationDirectory = centralDir
    from sourceSets.main.allJava
}

tasks.register('libraryJavadocJar', Jar.class) {
    archiveBaseName = 'eyelib'
    archiveClassifier = 'javadoc'
    archiveVersion = project.version
    destinationDirectory = centralDir
    from tasks.named('javadoc')
}

publishing {
    publications {
        // Publication 1: Forge mod distribution — jarJar + reobfuscation, POM carries mod deps
        mavenJava(MavenPublication) {
            from components.java
            suppressPomMetadataWarningsFor('reobfApiElements')
            suppressPomMetadataWarningsFor('reobfRuntimeElements')

            pom {
                name = project.mod_name
                description = project.mod_description
                url = "https://github.com/${githubUserName}/${githubRepoName}"

                scm {
                    connection = "scm:git:git://github.com/${githubUserName}/${githubRepoName}.git"
                    developerConnection = "scm:git:ssh://github.com/${githubUserName}/${githubRepoName}.git"
                    url = "https://github.com/${githubUserName}/${githubRepoName}"
                }

                licenses {
                    license {
                        name = 'MIT'
                        url = "https://github.com/${githubUserName}/${githubRepoName}/tree/master/LICENSE"
                    }
                }

                developers {
                    developer {
                        id = 'tt432'
                        name = 'Chin'
                        email = '2437315224@qq.com'
                    }
                }
            }
        }

        // Publication 2: clean library jar + filtered POM for Maven Central consumers
        mavenCentralLibrary(MavenPublication) {
            artifact tasks.named('libraryJar')
            artifact tasks.named('librarySourcesJar')
            artifact tasks.named('libraryJavadocJar')

            pom {
                name = project.mod_name
                description = project.mod_description
                url = "https://github.com/${githubUserName}/${githubRepoName}"

                scm {
                    connection = "scm:git:git://github.com/${githubUserName}/${githubRepoName}.git"
                    developerConnection = "scm:git:ssh://github.com/${githubUserName}/${githubRepoName}.git"
                    url = "https://github.com/${githubUserName}/${githubRepoName}"
                }

                licenses {
                    license {
                        name = 'MIT'
                        url = "https://github.com/${githubUserName}/${githubRepoName}/tree/master/LICENSE"
                    }
                }

                developers {
                    developer {
                        id = 'tt432'
                        name = 'Chin'
                        email = '2437315224@qq.com'
                    }
                }

                withXml {
                    def deps = asNode().appendNode('dependencies')

                    centralCompileDeps.each { dep ->
                        def n = deps.appendNode('dependency')
                        n.appendNode('groupId', dep.groupId)
                        n.appendNode('artifactId', dep.artifactId)
                        n.appendNode('version', dep.version)
                        n.appendNode('scope', 'compile')
                    }

                    centralRuntimeDeps.each { dep ->
                        def n = deps.appendNode('dependency')
                        n.appendNode('groupId', dep.groupId)
                        n.appendNode('artifactId', dep.artifactId)
                        n.appendNode('version', dep.version)
                        n.appendNode('scope', 'runtime')
                    }
                }
            }
        }
    }

    repositories {
        mavenLocal()
    }
}

// Nexus publish plugin — automatic staging close & release via OSSRH Staging API
// (OSSRH shut down June 2025; replaced by https://ossrh-staging-api.central.sonatype.com)
// Credentials from gradle.properties: ossrhUsername / ossrhPassword (Portal Token)
// Note: add --no-configuration-cache when publishing (plugin not yet compatible)
nexusPublishing {
    repositories {
        sonatype {
            nexusUrl.set(uri('https://ossrh-staging-api.central.sonatype.com/service/local/'))
            snapshotRepositoryUrl.set(uri('https://central.sonatype.com/repository/maven-snapshots/'))
            username = project.findProperty('ossrhUsername')
            password = project.findProperty('ossrhPassword')
        }
    }
}

// Configure publishing for all subprojects (POM metadata, javadoc, signing)
subprojects {
    afterEvaluate { p ->
        // Javadoc generation (required by Maven Central portal)
        p.java {
            withSourcesJar()
            withJavadocJar()
        }
        p.tasks.named('javadoc', Javadoc).configure {
            options.addStringOption('Xdoclint:none', '-quiet')
            options.encoding = 'UTF-8'
            source = p.sourceSets.main.allJava
        }

        p.publishing {
            publications {
                mavenJava(MavenPublication) {
                    pom {
                        name = p.base.archivesName.get()
                        description = p.findProperty('mod_description') ?: ''
                        url = "https://github.com/${githubUserName}/${githubRepoName}"

                        scm {
                            connection = "scm:git:git://github.com/${githubUserName}/${githubRepoName}.git"
                            developerConnection = "scm:git:ssh://github.com/${githubUserName}/${githubRepoName}.git"
                            url = "https://github.com/${githubUserName}/${githubRepoName}"
                        }

                        licenses {
                            license {
                                name = 'MIT'
                                url = "https://github.com/${githubUserName}/${githubRepoName}/tree/master/LICENSE"
                            }
                        }

                        developers {
                            developer {
                                id = 'tt432'
                                name = 'Chin'
                                email = '2437315224@qq.com'
                            }
                        }
                    }
                    suppressPomMetadataWarningsFor('reobfApiElements')
                    suppressPomMetadataWarningsFor('reobfRuntimeElements')
                }
            }

            repositories {
                mavenLocal()
            }
        }

        // Subprojects need their own signing since portal validates per-module
        p.apply plugin: 'signing'
        p.signing {
            sign p.publishing.publications
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.errorprone.enabled = false
    options.errorprone.disableWarningsInGeneratedCode = true
}

tasks.register('nullawayMain', JavaCompile) {
    group = 'verification'
    description = 'Runs NullAway/Error Prone on main Java sources with an isolated processor path.'

    source = sourceSets.main.java
    classpath = sourceSets.main.compileClasspath
    destinationDirectory = layout.buildDirectory.dir('classes/java/nullawayMain')
    options.annotationProcessorPath = configurations.nullawayProcessor
    options.errorprone.enabled = true
    options.errorprone.disableWarningsInGeneratedCode = true
    options.errorprone.check('NullAway', net.ltgt.gradle.errorprone.CheckSeverity.ERROR)
    options.errorprone.option('NullAway:AnnotatedPackages', 'io.github.tt432.eyelib')
    options.errorprone.option('NullAway:CheckOptionalEmptiness', 'true')
    options.errorprone.errorproneArgs.add('-XepDisableAllChecks')
    options.errorprone.errorproneArgs.add('-Xep:NullAway:ERROR')
}

tasks.named('check').configure {
    dependsOn tasks.named('nullawayMain')
}

tasks.named('test').configure {
    useJUnitPlatform()
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

tasks.register('runWithRenderDoc', Exec) {
    def javaExecTask = tasks.withType(JavaExec).named('runClient').get()
    def javaHome = javaExecTask.javaLauncher.get().metadata.installationPath.asFile.absolutePath

    commandLine = [
            'E:\\RenderDoc\\renderdoccmd.exe',
            'capture',
            '--opt-hook-children',
            '--wait-for-exit',
            '--working-dir',
            '.',
            "$javaHome/bin/java.exe",
            '-Xmx64m',
            '-Xms64m',
            '-Dorg.gradle.appname=gradlew',
            "-Dorg.gradle.java.home=$javaHome",
            '-classpath',
            'gradle/wrapper/gradle-wrapper.jar',
            'org.gradle.wrapper.GradleWrapperMain',
            'runClient'
    ]
}
