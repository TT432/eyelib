plugins {
    id 'idea'
    id 'java-library'
    id 'maven-publish'
    id 'io.freefair.lombok'
    id 'net.ltgt.errorprone'
    id 'signing'
}

// Stonecutter centralScript: 此脚本对每个 version node (:1.20.1, :1.21.1) 各跑一次。
// 0.7.x 无 sc 别名与 parsed，用 stonecutter.current.version + stonecutter.eval 比较。
def mcVersion = stonecutter.current.version
def isLegacyForge = stonecutter.eval(mcVersion, '<1.20.6')

// Stonecutter 0.7.x centralScript 不自动替换 sourceSet：compileJava 默认编译 src/main/java，
// 但加了 //? 注释后原始源码有裸露的 else 分支导致语法错误。
// 必须让 sourceSet 指向 stonecutterGenerate 的生成目录。
def stonecutterGenerated = layout.buildDirectory.dir('generated/stonecutter/main/java')
sourceSets.main.java.srcDirs = [stonecutterGenerated]
compileJava.dependsOn 'stonecutterGenerate'

// 同理，test sourceSet 也需指向 stonecutterGenerateTest 的生成目录。
def stonecutterTestGenerated = layout.buildDirectory.dir('generated/stonecutter/test/java')
sourceSets.test.java.srcDirs = [stonecutterTestGenerated]
compileTestJava.dependsOn 'stonecutterGenerateTest'

if (isLegacyForge) {
    apply plugin: 'net.neoforged.moddev.legacyforge'
} else {
    apply plugin: 'net.neoforged.moddev'
}

if (project == rootProject) {
    tasks.named('wrapper', Wrapper).configure {
        distributionType = Wrapper.DistributionType.BIN
    }
}

version = "${mod_version}+${minecraft_version}-${isLegacyForge ? 'forge' : 'neoforge'}"
group = mod_group_id

repositories {
    mavenCentral()
    mavenLocal()
    exclusiveContent {
        forRepository {
            maven {
                name = "Modrinth"
                url = "https://api.modrinth.com/maven"
            }
        }
        filter {
            includeGroup "maven.modrinth"
        }
    }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(property('java_version') as int)

if (isLegacyForge) {
legacyForge {
    // Specify the version of MinecraftForge to use.
    version = project.minecraft_version + '-' + project.forge_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers = project.files('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()

            // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id

            systemProperty 'eyelib.preventMouseGrab', 'true'
            systemProperty 'eyelib.minimizeWindow', 'true'
        }

        clientSmoke {
            client()
            gameDirectory = project.file('run/clientsmoke')
            systemProperty 'forge.enabledGameTestNamespaces', 'clientsmoke'
            systemProperty 'clientsmoke.enabled', 'true'
            systemProperty 'clientsmoke.autoExit', 'true'
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'forge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}
} else {
neoForge {
    version = project.neoforge_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    runs {
        client {
            client()
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            systemProperty 'eyelib.preventMouseGrab', 'true'
            systemProperty 'eyelib.minimizeWindow', 'true'
        }

        clientSmoke {
            client()
            gameDirectory = project.file('run/clientsmoke')
            systemProperty 'neoforge.enabledGameTestNamespaces', 'clientsmoke'
            systemProperty 'clientsmoke.enabled', 'true'
            systemProperty 'clientsmoke.autoExit', 'true'
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        configureEach {
            systemProperty 'forge.logging.markers', 'REGISTRIES'
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }
sourceSets {
    test {
        compileClasspath += sourceSets.main.output + sourceSets.main.compileClasspath
        runtimeClasspath += sourceSets.main.output + sourceSets.main.runtimeClasspath
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
    nullawayProcessor
}
if (isLegacyForge) {
    obfuscation {
        createRemappingConfiguration(configurations.localRuntime)
    }
}

// Fix ObfuscationExtension.reobfuscate() variant replacement (ModDevGradle ObfuscationExtension.java:123-147)
// The original apiElements/runtimeElements are skipped and replaced with dependency-free reobf variants.
// Restore proper dependency inheritance so published POMs carry correct transitive dependencies.
allprojects {
    afterEvaluate { p ->
        p.configurations.matching { it.name == 'reobfApiElements' }.all { c ->
            def apiCfg = p.configurations.findByName('api')
            if (apiCfg) c.extendsFrom(apiCfg)
        }
        p.configurations.matching { it.name == 'reobfRuntimeElements' }.all { c ->
            def rtCfg = p.configurations.findByName('runtimeClasspath')
            if (rtCfg) c.extendsFrom(rtCfg)
        }
    }
}

dependencies {
    // 显式添加 Lombok：neoForge plugin 的 ModDevGradle 可能重配置 annotationProcessorPath，
    // 覆盖 freefair lombok 插件自动添加的处理器。显式声明确保 Lombok 在所有 node 生效。
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'

    compileOnly("maven.modrinth:acceleratedrendering:1.0.5-1.20.1-alpha")

    // Client Smoke Test is supplied by the composite build in ./clientsmoke.
    compileOnly "io.github.tt432:clientsmoke:${version}"
    localRuntime "io.github.tt432:clientsmoke:${version}"

    // AI Debug Server — dev-only runtime Java execution, gated by FMLLoader.isProduction()
    additionalRuntimeClasspath(implementation('org.codehaus.janino:janino:3.1.12'))

    jarJar additionalRuntimeClasspath(implementation('io.github.dmlloyd:jdk-classfile-backport:24.0'))
    jarJar additionalRuntimeClasspath(implementation('com.h2database:h2:2.4.240'))
    compileOnly 'org.jspecify:jspecify:1.0.0'
    errorprone 'com.google.errorprone:error_prone_core:2.42.0'
    errorprone 'com.uber.nullaway:nullaway:0.13.7'
    nullawayProcessor 'org.projectlombok:lombok:1.18.36'
    nullawayProcessor 'com.google.guava:guava:33.4.0-jre'
    nullawayProcessor 'com.google.errorprone:error_prone_core:2.42.0'
    nullawayProcessor 'com.uber.nullaway:nullaway:0.13.7'

    compileOnly(annotationProcessor('io.github.llamalad7:mixinextras-common:0.5.0'))
    implementation(jarJar('io.github.llamalad7:mixinextras-forge:0.5.0'))

//    implementation("maven.modrinth:physicsmod:3.0.20")

//    implementation "org.lwjgl:lwjgl-assimp:3.3.3"
//    runtimeOnly "org.lwjgl:lwjgl-assimp:3.3.3:natives-windows"

    testImplementation platform('org.junit:junit-bom:5.10.2')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation 'com.h2database:h2:2.4.240'
    testImplementation sourceSets.main.output
}

if (isLegacyForge) {
    mixin {
        add sourceSets.main, "${mod_id}.refmap.json"
        config "${mod_id}.mixins.json"
    }

    dependencies {
        annotationProcessor 'org.spongepowered:mixin:0.8.5:processor'
    }
}

jar {
    if (isLegacyForge) {
        manifest.attributes([
                "MixinConfigs": "${mod_id}.mixins.json"
        ])
    }
}

signing {
    sign publishing.publications
}

java {
    withSourcesJar()
    withJavadocJar()
}

tasks.named('javadoc', Javadoc).configure {
    options.addStringOption('Xdoclint:none', '-quiet')
    options.encoding = 'UTF-8'
    // Use original source (not delombok) to avoid delombok configuration-cache issues
    source = sourceSets.main.allJava
}

var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [
            minecraft_version        : minecraft_version,
            minecraft_version_range  : minecraft_version_range,
            forge_version            : findProperty('forge_version') ?: '',
            forge_version_range      : findProperty('forge_version_range') ?: '',
            loader_version_range     : findProperty('loader_version_range') ?: '',
            neoforge_version         : findProperty('neoforge_version') ?: '',
            mod_id                   : mod_id,
            mod_name                 : mod_name,
            mod_license              : mod_license,
            mod_version              : mod_version,
            mod_authors              : mod_authors,
            mod_description          : mod_description
    ]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}
// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
if (isLegacyForge) {
    legacyForge.ideSyncTask generateModMetadata
} else {
    neoForge.ideSyncTask generateModMetadata
}

// Stonecutter //? 预处理输出（build/generated/stonecutter/）被 ModDevGradle createMinecraftArtifacts 读取，
// 需显式声明 task 依赖，否则 Gradle 8 task validation 报 implicit_dependency 错误。
tasks.matching { it.name == 'createMinecraftArtifacts' }.configureEach {
    dependsOn tasks.matching { it.name == 'stonecutterGenerate' }
}

publishing {
    publications {
        // Publication 1: Forge mod distribution — jarJar + reobfuscation, POM carries mod deps
        mavenJava(MavenPublication) {
            from components.java
            suppressPomMetadataWarningsFor('reobfApiElements')
            suppressPomMetadataWarningsFor('reobfRuntimeElements')

            pom {
                name = project.mod_name
                description = project.mod_description
                url = "https://github.com/${githubUserName}/${githubRepoName}"

                scm {
                    connection = "scm:git:git://github.com/${githubUserName}/${githubRepoName}.git"
                    developerConnection = "scm:git:ssh://github.com/${githubUserName}/${githubRepoName}.git"
                    url = "https://github.com/${githubUserName}/${githubRepoName}"
                }

                licenses {
                    license {
                        name = 'MIT'
                        url = "https://github.com/${githubUserName}/${githubRepoName}/tree/master/LICENSE"
                    }
                }

                developers {
                    developer {
                        id = 'tt432'
                        name = 'Chin'
                        email = '2437315224@qq.com'
                    }
                }
            }
        }
    }

    repositories {
        mavenLocal()
    }
}



tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.errorprone.enabled = false
    options.errorprone.disableWarningsInGeneratedCode = true
    options.compilerArgs += ['-Xmaxerrs', '1000', '-Xmaxwarns', '100']
    // Java 21 javac 模块封装阻止 Lombok 访问内部 API，需 --add-opens
    def lombokJar = configurations.detachedConfiguration(
            dependencies.create('org.projectlombok:lombok:1.18.36')
    ).singleFile
    options.fork = true
    options.forkOptions.jvmArgs += "-javaagent:${lombokJar.absolutePath}".toString()
    ['code', 'comp', 'file', 'main', 'model', 'parser', 'processing', 'tree', 'util', 'api', 'jvm'].each { pkg ->
        options.forkOptions.jvmArgs += ['--add-opens', "jdk.compiler/com.sun.tools.javac.${pkg}=ALL-UNNAMED".toString()]
    }
}

tasks.register('nullawayMain', JavaCompile) {
    group = 'verification'
    description = 'Runs NullAway/Error Prone on main Java sources with an isolated processor path.'

    source = sourceSets.main.java
    classpath = sourceSets.main.compileClasspath
    destinationDirectory = layout.buildDirectory.dir('classes/java/nullawayMain')
    options.annotationProcessorPath = configurations.nullawayProcessor
    options.errorprone.enabled = true
    options.errorprone.disableWarningsInGeneratedCode = true
    options.errorprone.check('NullAway', net.ltgt.gradle.errorprone.CheckSeverity.ERROR)
    options.errorprone.check('RequireExplicitNullMarking', net.ltgt.gradle.errorprone.CheckSeverity.ERROR)
    options.errorprone.option('NullAway:OnlyNullMarked', 'true')
    options.errorprone.option('NullAway:CheckOptionalEmptiness', 'true')
    options.errorprone.errorproneArgs.add('-XepDisableAllChecks')
    options.errorprone.errorproneArgs.add('-Xep:NullAway:ERROR')
    options.errorprone.errorproneArgs.add('-Xep:RequireExplicitNullMarking:ERROR')
}

tasks.named('check').configure {
    dependsOn tasks.named('nullawayMain')
}

tasks.named('test').configure {
    useJUnitPlatform()
    // Stonecutter centralScript 下 :<version> 子项目的工作目录是 versions/<ver>/，
    // 但源码在 root。测试用相对路径 Path.of("src/...") 访问 fixture，需回指 root。
    workingDir = rootProject.projectDir
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

tasks.register('runWithRenderDoc', Exec) {
    def javaExecTask = tasks.withType(JavaExec).named('runClient').get()
    def javaHome = javaExecTask.javaLauncher.get().metadata.installationPath.asFile.absolutePath

    commandLine = [
            'E:\\RenderDoc\\renderdoccmd.exe',
            'capture',
            '--opt-hook-children',
            '--wait-for-exit',
            '--working-dir',
            '.',
            "$javaHome/bin/java.exe",
            '-Xmx64m',
            '-Xms64m',
            '-Dorg.gradle.appname=gradlew',
            "-Dorg.gradle.java.home=$javaHome",
            '-classpath',
            'gradle/wrapper/gradle-wrapper.jar',
            'org.gradle.wrapper.GradleWrapperMain',
            'runClient'
    ]
}
