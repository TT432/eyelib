schema_version: 1
kind: bedrock_addon_effect_tracker
scope: strict_bedrock_addon_pipeline
updated_at: 2026-04-19
owner_module: eyelib-importer
decision_rules:
  implemented_end_to_end:
    requires:
      - importer-side field/resource family has observable semantic effect
      - root runtime directly consumes `io.github.tt432.eyelibimporter.addon.BedrockAddon*` output, or a dedicated bridge from `BedrockAddon.aggregate()` into runtime publication exists
  effective_importer_only:
    means:
      - importer uses the field/resource family for ordering, warning emission, aggregation, flattening, indexing, or typed parsing
      - no direct BedrockAddon -> root runtime consumer found
  retained_only:
    means:
      - importer retains raw structure only
      - no semantic importer logic beyond storage/wrapping
  not_implemented:
    means:
      - field/resource family is absent from importer schema/logic or routed to unmanaged scope
  important_non_goal:
    - root-side loaders that parse the same resource family directly from `ResourceManager` do not count as BedrockAddon end-to-end support
  bridge_api_present_but_not_wired:
    means:
      - root has an explicit `BedrockAddon` runtime bridge API
      - no lifecycle or production caller invokes it yet
evidence_summary:
  no_root_runtime_consumer_of_bedrock_addon:
    verified_by_search:
      - src/main/java contains no `BedrockAddon`, `BedrockAddonAggregate`, or `io.github.tt432.eyelibimporter.addon` references
    code_refs:
      - eyelib-importer/src/main/java/io/github/tt432/eyelibimporter/addon/BedrockAddonLoader.java
      - eyelib-importer/src/test/java/io/github/tt432/eyelibimporter/addon/BedrockAddonLoaderTest.java
      - eyelib-importer/src/test/java/io/github/tt432/eyelibimporter/addon/BedrockAddonRealFixtureIntegrationTest.java
  explicit_root_bridge_api:
    code_refs:
      - src/main/java/io/github/tt432/eyelib/client/loader/BedrockAddonRuntimeBridge.java
      - src/main/java/io/github/tt432/eyelib/client/registry/AttachableAssetRegistry.java
      - src/main/java/io/github/tt432/eyelib/client/manager/AttachableManager.java
queries:
  bridge_ready_items:
    where:
      overall_status: effective_importer_only
      runtime_bridge.kind: analogous_runtime_path_exists
  explicit_bridge_api_items:
    where:
      overall_status: bridge_api_present_but_not_wired
  schema_gap_items:
    where:
      overall_status:
        - retained_only
        - not_implemented
  warning_only_items:
    where:
      effect_kind:
        - warning_emission
items:
  - id: addon.packs
    layer: addon_root
    path: BedrockAddon.packs
    effect_kind: pack_discovery
    overall_status: effective_importer_only
    importer_effect: ordered pack set is produced by addon loading
    runtime_bridge:
      kind: no_consumer
    code_refs:
      - eyelib-importer/src/main/java/io/github/tt432/eyelibimporter/addon/BedrockAddon.java
      - eyelib-importer/src/main/java/io/github/tt432/eyelibimporter/addon/BedrockAddonLoader.java
    next_actions:
      - keep as root container; do not treat as runtime asset until a bridge exists

  - id: addon.resource_data_pack_split
    layer: addon_root
    path:
      - BedrockAddon.resourcePacks()
      - BedrockAddon.dataPacks()
    effect_kind: pack_partition
    overall_status: effective_importer_only
    importer_effect: manifest module types split RP/BP views
    runtime_bridge:
